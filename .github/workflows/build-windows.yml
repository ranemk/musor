name: Build Windows exe

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build parashaoly.exe
    runs-on: windows-latest

    steps:
      - name: Get source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build exe
        run: python -m PyInstaller --clean --noconfirm .\L2DamageMeter.spec

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: parashaoly-windows
          path: dist\parashaoly.exe
          if-no-files-found: error
